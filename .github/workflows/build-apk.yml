name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 22 LTS
      uses: actions/setup-node@v4
      with:
        node-version: '22'  # Capacitor CLI requires Node.js >=22.0.0
        cache: 'npm'

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34  # 指定Android API级别
        build-tools-version: '34.0.0'  # 指定构建工具版本
        ndk-version: '26.1.10909125'  # 指定NDK版本
        cmake-version: '3.22.1'  # 指定CMake版本

    - name: Accept Android Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        echo "Android SDK setup complete"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "Java version:"
        java -version

    - name: Install dependencies
      run: npm ci

    - name: Build web app
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        echo "Building Debug APK..."
        ./gradlew assembleDebug --stacktrace
        echo "Debug APK built successfully"

        echo "Building Release APK..."
        ./gradlew assembleRelease --stacktrace
        echo "Release APK built successfully"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: minimal-productivity-app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: minimal-productivity-app-release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: error